<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Annotator</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        canvas { border: 1px solid black; cursor: crosshair; }
        .container { display: flex; gap: 20px; margin-top: 10px; }
        .sidebar { width: 420px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 6px; text-align: left; }
        th { background: #f5f5f5; }
        .meta-section { margin: 10px 0; display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        .meta-section label { font-weight: bold; font-size: 13px; }
        .meta-section input { padding: 4px 6px; width: 140px; }
        .label-input { width: 120px; padding: 2px 4px; font-size: 12px; }
        button { padding: 6px 12px; cursor: pointer; }
        .toolbar { margin: 10px 0; display: flex; gap: 10px; align-items: center; }
        .img-info { font-size: 12px; color: #666; margin-left: 10px; }
    </style>
</head>
<body>
    <h2>Defect Annotator Tool</h2>

    <div class="toolbar">
        <input type="file" id="imageLoader" accept="image/*">
        <button id="exportCsv">Export DVI_box_data.csv</button>
        <span id="imgInfo" class="img-info"></span>
    </div>

    <div class="meta-section">
        <label>LOT: <input type="text" id="metaLot" placeholder="ex: X609M210"></label>
        <label>Visual ID: <input type="text" id="metaVisualId" placeholder="ex: U62Q7U6607528"></label>
        <label>DR Result: <input type="text" id="metaDrResult" value="REJECT"></label>
    </div>

    <div class="container">
        <canvas id="imageCanvas"></canvas>
        <div class="sidebar">
            <h3>Drawn Defect Boxes (click Delete to remove)</h3>
            <table id="boxesTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Label (DR_SUB_ITEM)</th>
                        <th>Center (cx, cy)</th>
                        <th>Size (w x h)</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </div>
    </div>

    <script>
const canvas = document.getElementById('imageCanvas');
const ctx = canvas.getContext('2d');
const imageLoader = document.getElementById('imageLoader');
const exportCsvBtn = document.getElementById('exportCsv');
const boxesTableBody = document.querySelector('#boxesTable tbody');
const imgInfoSpan = document.getElementById('imgInfo');

let image = new Image();
let imageFileName = '';
let boxes = [];  // Each: { x, y, width, height, label }
let drawing = false;
let startX, startY, currentWidth, currentHeight;

imageLoader.addEventListener('change', handleImage, false);
canvas.addEventListener('mousedown', handleMouseDown, false);
canvas.addEventListener('mousemove', handleMouseMove, false);
canvas.addEventListener('mouseup', handleMouseUp, false);
exportCsvBtn.addEventListener('click', exportToCsv, false);

function handleImage(e) {
    const file = e.target.files[0];
    if (!file) return;
    imageFileName = file.name;
    const reader = new FileReader();
    reader.onload = function(event) {
        image.onload = function() {
            canvas.width = image.width;
            canvas.height = image.height;
            imgInfoSpan.textContent = `${imageFileName}  (${image.width} x ${image.height})`;
            boxes = [];
            redrawCanvas();
        }
        image.src = event.target.result;
    }
    reader.readAsDataURL(file);
}

function redrawCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
    ctx.lineWidth = 2;
    boxes.forEach((box, i) => {
        ctx.strokeStyle = 'red';
        ctx.strokeRect(box.x, box.y, box.width, box.height);
        // Draw label
        const cx = box.x + box.width / 2;
        const cy = box.y + box.height / 2;
        ctx.fillStyle = 'rgba(255,0,0,0.7)';
        ctx.font = '12px Arial';
        ctx.fillText(box.label || `DEFECT_${i+1}`, box.x + 2, box.y - 4);
    });
    updateTable();
}

function handleMouseDown(e) {
    startX = e.clientX - canvas.getBoundingClientRect().left;
    startY = e.clientY - canvas.getBoundingClientRect().top;
    drawing = true;
}

function handleMouseMove(e) {
    if (!drawing) return;
    const currentX = e.clientX - canvas.getBoundingClientRect().left;
    const currentY = e.clientY - canvas.getBoundingClientRect().top;
    currentWidth = currentX - startX;
    currentHeight = currentY - startY;
    redrawCanvas();
    ctx.strokeStyle = 'lime';
    ctx.lineWidth = 2;
    ctx.strokeRect(startX, startY, currentWidth, currentHeight);
}

function handleMouseUp(e) {
    drawing = false;
    if (currentWidth && currentHeight) {
        // Normalize: ensure positive width/height (top-left origin)
        let nx = startX, ny = startY, nw = currentWidth, nh = currentHeight;
        if (nw < 0) { nx += nw; nw = -nw; }
        if (nh < 0) { ny += nh; nh = -nh; }
        // Skip tiny accidental boxes
        if (nw > 3 && nh > 3) {
            boxes.push({
                x: nx, y: ny, width: nw, height: nh,
                label: `DEFECT_${boxes.length + 1}`
            });
        }
    }
    currentWidth = undefined;
    currentHeight = undefined;
    redrawCanvas();
}

function updateTable() {
    boxesTableBody.innerHTML = '';
    boxes.forEach((box, index) => {
        const cx = (box.x + box.width / 2).toFixed(1);
        const cy = (box.y + box.height / 2).toFixed(1);
        const w = box.width.toFixed(1);
        const h = box.height.toFixed(1);
        const row = boxesTableBody.insertRow();
        row.innerHTML = `
            <td>${index + 1}</td>
            <td><input class="label-input" type="text" value="${box.label}"
                 onchange="updateLabel(${index}, this.value)"></td>
            <td>${cx}, ${cy}</td>
            <td>${w} x ${h}</td>
            <td><button onclick="deleteBox(${index})">Delete</button></td>
        `;
    });
}

function updateLabel(index, newLabel) {
    boxes[index].label = newLabel;
    redrawCanvas();
}

function deleteBox(index) {
    boxes.splice(index, 1);
    redrawCanvas();
}

function exportToCsv() {
    if (boxes.length === 0) {
        alert('No boxes drawn. Draw at least one defect box first.');
        return;
    }

    const lot = document.getElementById('metaLot').value.trim() || 'UNKNOWN';
    const visualId = document.getElementById('metaVisualId').value.trim() || 'UNKNOWN';
    const drResult = document.getElementById('metaDrResult').value.trim() || 'REJECT';

    const header = 'LOT,VISUAL_ID,DR_RESULT,DR_SUB_ITEM,BOX_CTR_X,BOX_CTR_Y,BOX_SIDE_X,BOX_SIDE_Y,IMAGE_FULL_PATH,M_POSITION_X,M_POSITION_Y,COORD_SPACE';
    const rows = boxes.map(box => {
        // Convert top-left + size -> center + size
        const ctrX = (box.x + box.width / 2).toFixed(2);
        const ctrY = (box.y + box.height / 2).toFixed(2);
        const sideX = Math.abs(box.width).toFixed(2);
        const sideY = Math.abs(box.height).toFixed(2);
        const label = box.label.replace(/,/g, '_');  // sanitize commas
        return `${lot},${visualId},${drResult},${label},${ctrX},${ctrY},${sideX},${sideY},${imageFileName},0,0,PIXEL`;
    });

    const csvContent = header + '\n' + rows.join('\n') + '\n';
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.setAttribute('href', url);
    link.setAttribute('download', 'DVI_box_data.csv');
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
}
    </script>
</body>
</html>
